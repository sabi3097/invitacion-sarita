<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Invitación</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Cormorant Garamond', serif;
    }

    /* ─── PANTALLA 1: Pre-invitación ─── */
    #pantalla1 {
      position: fixed;
      inset: 0;
      background-image: url('CELEDONIOYANAOSPINA.webp');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      transition: opacity 0.9s ease;
    }

    #pantalla1::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.25);
    }

    #btn-ingresar {
      position: relative;
      z-index: 10;
      padding: 16px 48px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #fff;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.85);
      cursor: pointer;
      transition: all 0.4s ease;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      animation: aparecer 2s ease forwards;
      opacity: 0;
    }

    #btn-ingresar:hover {
      background: rgba(255,255,255,0.22);
      border-color: #fff;
      transform: scale(1.04);
      letter-spacing: 6px;
    }

    #btn-ingresar:active { transform: scale(0.97); }

    #btn-ingresar::before,
    #btn-ingresar::after {
      content: '✦';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      color: rgba(255,255,255,0.6);
    }
    #btn-ingresar::before { left: 14px; }
    #btn-ingresar::after  { right: 14px; }

    @keyframes aparecer {
      0%   { opacity: 0; transform: translateY(18px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ─── PANTALLA 2: Google Sites en iframe ─── */
    #pantalla2 {
      position: fixed;
      inset: 0;
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s ease;
    }

    #pantalla2 iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ─── Estados activos ─── */
    #pantalla1.oculta {
      opacity: 0;
      pointer-events: none;
    }

    #pantalla2.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* ─── Cortina de transición ─── */
    #cortina {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      z-index: 999;
    }
    #cortina.activa { opacity: 1; }
  </style>
</head>
<body>

  <!-- PANTALLA 1 -->
  <div id="pantalla1">
    <button id="btn-ingresar" onclick="ingresar()">ABRIR INVITACIÓN</button>
  </div>

  <!-- PANTALLA 2 (se carga al hacer clic) -->
  <div id="pantalla2">
    <iframe id="sitio"
      src=""
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

  <!-- Audio -->
  <audio id="player"
    src="https://drive.google.com/uc?export=download&id=1Jcz6vukKgLfDo8AjtsLLVXFIMLlcTrl6"
    loop>
  </audio>

  <!-- Cortina -->
  <div id="cortina"></div>

  <script>
    function ingresar() {
      var cortina = document.getElementById('cortina');
      var p1      = document.getElementById('pantalla1');
      var p2      = document.getElementById('pantalla2');
      var sitio   = document.getElementById('sitio');
      var audio   = document.getElementById('player');

      // 1. Reproducir audio (el clic lo permite)
      audio.play().catch(function(e){ console.log(e); });

      // 2. Mostrar cortina negra
      cortina.classList.add('activa');

      setTimeout(function() {
        // 3. Cargar Google Sites en el iframe
        sitio.src = 'https://sites.google.com/view/xvsarasofiasolanosabi/p%C3%A1gina-principal';

        // 4. Ocultar pantalla 1, mostrar pantalla 2
        p1.classList.add('oculta');
        p2.classList.add('visible');

        // 5. Quitar cortina
        cortina.classList.remove('activa');
      }, 600);
    }
  </script>

</body>
</html>
